spring.application.name=fx-app
server.port=8080

# fxdb — seeded by docker-compose on first `docker compose up` (ops/fxdb-seed.sql).
# In Docker these are overridden by the SPRING_DATASOURCE_* env vars in docker-compose.yml.
# Running locally (./mvnw spring-boot:run) uses the values below — needs MySQL on localhost.
spring.datasource.url=jdbc:mysql://localhost:3306/fxdb
spring.datasource.username=appuser
spring.datasource.password=apppass

# Never leak a stack trace to the browser (see com.fx.web.ApiExceptionHandler too).
server.error.include-message=never
server.error.include-stacktrace=never

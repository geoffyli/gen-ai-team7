<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FX App — History</title>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <header class="topbar">
      <span class="brand"><span class="fx">FX</span> App</span>
      <nav class="menu">
        <a href="/">Welcome</a>
        <a href="/currencies.html">Currencies</a>
        <a href="/#rates">Rates</a>
        <a href="/convert.html">Convert</a>
        <a href="/history.html" class="active">History</a>
      </nav>
    </header>

    <main>
      <h1>Transfer history</h1>
      <p class="lede">
        Every recorded transfer, newest first, via
        <span class="mono">GET /api/transfers</span>.
      </p>

      <div class="panel">
        <table>
          <thead>
            <tr>
              <th>From</th>
              <th>To</th>
              <th>Amount</th>
              <th>Currency</th>
              <th>Executed at</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr>
              <td colspan="6" class="status">Loading…</td>
            </tr>
          </tbody>
        </table>
        <p id="status" class="status"></p>
      </div>
    </main>

    <script src="/js/history.js"></script>
  </body>
</html>

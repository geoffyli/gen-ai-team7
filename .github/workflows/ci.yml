name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # Unit + contract tests, then the Testcontainers DB integration tests (mvn verify).
  # GitHub's ubuntu runners have Docker, so Testcontainers "just works".
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build + unit/contract + DB integration tests
        run: ./mvnw -B verify

  # Full-stack smoke test: boot the real stack and assert the endpoints answer correctly.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Boot the stack
        run: docker compose up --build -d
      - name: Wait for the app to be healthy
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/health && break
            sleep 2
          done
      - name: Assert seeded data + endpoints
        run: |
          curl -sf http://localhost:8080/api/health/db | grep '"currency":8'
          curl -sf http://localhost:8080/api/currencies | grep -q '"EUR"'
      - name: Logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down
        if: always()
        run: docker compose down -v
